name: Build Last Human Online APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  get-activation-file:
    name: Get Unity activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getalf
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.4.7f1
      - name: Upload alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.alf
          path: ${{ steps.getalf.outputs.filePath }}
          retention-days: 3

  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: get-activation-file
    steps:
      - uses: actions/checkout@v4
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**') }}
          restore-keys: Library-
      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.7f1
          targetPlatform: Android
          androidExportType: androidPackage
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LastHumanOnline-APK
          path: build/Android
          retention-days: 30
