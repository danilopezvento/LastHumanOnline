name: Build Last Human Online APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # JOB 1: Genera .alf desde runner Linux para activacion manual
  get-activation-file:
    name: Get Unity activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getalf
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.4.7f1

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.alf
          path: ${{ steps.getalf.outputs.filePath }}
          retention-days: 3

  # JOB 2: Build Android - requiere secret UNITY_LICENSE configurado
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: get-activation-file
    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**') }}
          restore-keys: Library-

      - name: Build with game-ci
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.7f1
          targetPlatform: Android
          androidExportType: androidPackage

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LastHumanOnline-APK
          path: build/Android
          retention-days: 30name: Build Last Human Online APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # PASO 1: Genera el .alf desde Linux (necesario para activar licencia en CI)
  get-activation-file:
    name: Get Unity activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getalf
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.4.7f1

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.alf
          path: ${{ steps.getalf.outputs.filePath }}
          retention-days: 3

  # PASO 2: Build Android (activo cuando UNITY_LICENSE esta en secrets)
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: ${{ secrets.UNITY_LICENSE != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**') }}
          restore-keys: Library-

      - name: Build with game-ci
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.7f1
          targetPlatform: Android
          androidExportType: androidPackage

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LastHumanOnline-APK
          path: build/Android
          retention-days: 30
